# Production deployment workflow for the Astro docs site.
#
# Triggered on every push to `main`. The pipeline:
#   1. Builds the Astro static site (shallow clone, skips doc history)
#   2. Builds doc history JSONs (full clone, standalone server package)
#   3. Merges both build outputs and deploys to Cloudflare Pages (production)
#   4. Sends IFTTT notification with deploy status
#
# Inter-job data sharing uses actions/cache (not upload-artifact) to avoid
# Actions storage accumulation. Cache keys are scoped to github.run_id so
# each run gets a fresh, unique cache that won't be reused by other runs.
#
# Concurrency: only one production deploy runs at a time.
# We do NOT cancel in-progress runs -- the earlier deploy should finish.

name: Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build the Astro docs site (shallow clone — fast)
  # ---------------------------------------------------------------------------
  build-site:
    name: Build Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          SKIP_DOC_HISTORY: "1"

      - name: Cache site build output
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist/
          key: dist-${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Job 2: Build doc history JSONs (full clone — only this job needs it)
  # ---------------------------------------------------------------------------
  build-history:
    name: Build Doc History
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate doc history
        run: |
          pnpm --filter @zudo-doc/doc-history-server generate \
            --content-dir ../../src/content/docs \
            --locale ja:../../src/content/docs-ja \
            --out-dir ../../doc-history-out

      - name: Cache doc history output
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: doc-history-out/
          key: doc-history-${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Cloudflare Pages (production)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Pages
    needs: [build-site, build-history]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restore site build cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist/
          key: dist-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Restore doc history cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: doc-history-out/
          key: doc-history-${{ github.run_id }}

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/zudo-doc
          # When aiAssistant is enabled, Astro outputs static files to dist/client/
          if [ -d dist/client ]; then
            cp -r dist/client/. deploy/pj/zudo-doc/
          else
            cp -r dist/. deploy/pj/zudo-doc/
          fi
          # Merge doc history JSONs into the deploy directory (if available)
          if [ -d doc-history-out ] && [ "$(ls -A doc-history-out 2>/dev/null)" ]; then
            mkdir -p deploy/pj/zudo-doc/doc-history
            cp -r doc-history-out/. deploy/pj/zudo-doc/doc-history/
          fi
          echo '/ /pj/zudo-doc/ 302' > deploy/_redirects

      - name: Deploy to Cloudflare Pages (production)
        run: |
          npx wrangler@4 pages deploy deploy \
            --project-name=zudo-doc \
            --branch=main \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Production deploy: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Job 4: Send IFTTT notification with deploy status
  # ---------------------------------------------------------------------------
  notify:
    name: Deploy Notification
    needs: [build-site, build-history, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Notify via IFTTT
        if: env.IFTTT_PROD_NOTIFY != ''
        env:
          IFTTT_PROD_NOTIFY: ${{ secrets.IFTTT_PROD_NOTIFY }}
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
          BUILD_SITE_RESULT: ${{ needs.build-site.result }}
          BUILD_HISTORY_RESULT: ${{ needs.build-history.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          GITHUB_SHA_VAL: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="zudo-doc deploy succeeded!"
          elif [ "$BUILD_SITE_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (site build)"
          elif [ "$BUILD_HISTORY_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (history build)"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (deploy)"
          else
            STATUS="zudo-doc deploy cancelled"
          fi

          COMMIT_MSG=$(echo "$RAW_COMMIT_MSG" | head -1 | sed 's/"/\\"/g')
          SHORT_SHA=$(echo "$GITHUB_SHA_VAL" | cut -c1-7)
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          curl -sSf --max-time 10 -X POST "$IFTTT_PROD_NOTIFY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"value1\": \"${STATUS}\",
              \"value2\": \"${SHORT_SHA} ${COMMIT_MSG}\",
              \"value3\": \"${RUN_URL}\"
            }" || echo "::warning::IFTTT notification failed"
