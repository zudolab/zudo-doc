# Production deployment workflow for the zudo-doc site.
#
# Triggered on every push to `main`. The pipeline:
#   1. Builds the zfb Rust binary at the pinned SHA (single artifact)
#   2. Builds the static site (shallow clone, skips doc history)
#   3. Builds doc history JSONs (full clone, standalone server package)
#   4. Merges both build outputs and deploys to Cloudflare Pages (production)
#   5. Sends IFTTT notification with deploy status
#
# zfb is consumed as `file:../zfb/...` workspace deps. Each install-bearing
# job clones the public Takazudo/zudo-front-builder repo at the pinned SHA
# to ../zfb so those deps resolve, then downloads two prebuilt artifacts
# from the build-zfb job below: zfb-binary (the Rust CLI, into
# ../zfb/target/release/zfb) and zfb-tailwind-binary (the tailwindcss v4
# standalone CLI, into ../zfb/crates/zfb/binaries/tailwindcss-v4). The
# postinstall hooks (zfb-fetch-tailwind.mjs + zfb-link.mjs) pick both up.
# See pr-checks.yml for the full rationale.
#
# Inter-job data sharing uses actions/cache (not upload-artifact) to avoid
# Actions storage accumulation. Cache keys are scoped to github.run_id so
# each run gets a fresh, unique cache that won't be reused by other runs.
#
# Concurrency: only one production deploy runs at a time.
# We do NOT cancel in-progress runs -- the earlier deploy should finish.
#
# ----------------------------------------------------------------------------
# Deployed artifact contract (9 categories, audited in epic #1337 task 5).
# Future edits MUST keep these intact in the merged deploy/ directory:
#
#   (a) dist/index.html and per-route dist/**/index.html           (HTML pages)
#   (b) dist/404.html at root                                      (zfb #100)
#   (c) dist/_redirects                                            (overwritten
#       at deploy time below to /  /pj/zudo-doc/ 302 — see step body)
#   (d) dist/sitemap.xml                                           (page route
#       pages/sitemap.xml.tsx, ADR-005)
#   (e) dist/search-index.json                                     (search-index
#       plugin, postBuild hook)
#   (f) dist/llms.txt + dist/llms-full.txt + per-locale variants   (llms-txt
#       plugin, postBuild hook)
#   (g) dist/doc-history/*.json                                    (merged in
#       from build-history job below)
#   (h) dist/_worker.js + dist/_zfb_inner.mjs                      (advanced-mode
#       CF Pages bundle — emitted by `@takazudo/zfb-adapter-cloudflare` because
#       pages/api/ai-chat.tsx exports `prerender = false`. See zfb.config.ts.)
#   (i) _headers / _routes.json — currently N/A, neither file is generated by
#       any zfb plugin or `public/` source today. Add to this list if introduced.
#
# IMPORTANT (CF Pages advanced-mode placement, epic #1337 task 5):
#   Cloudflare Pages requires `_worker.js` at the ROOT of the directory passed
#   to `wrangler pages deploy`. Because the project's `settings.base` is
#   "/pj/zudo-doc/" we currently nest the build under deploy/pj/zudo-doc/, which
#   places `_worker.js` at deploy/pj/zudo-doc/_worker.js — NOT recognised by
#   CF Pages as the SSR entry. SSR routes (currently only /api/ai-chat) will
#   not work until the deploy layout is reshaped (move _worker.js +
#   _zfb_inner.mjs to deploy/_worker.js + deploy/_zfb_inner.mjs, OR drop the
#   /pj/zudo-doc/ nesting entirely). Out of scope for the topic-5 audit; tracked
#   separately. Until then the AI-chat endpoint is expected to 404 in prod.
# ----------------------------------------------------------------------------

name: Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Pinned zfb commit — keep in sync with the zfb pin comment at the
  # top of zfb.config.ts and the same env in pr-checks.yml.
  ZFB_PINNED_SHA: 88cec078b568596b57b5ba041adc2849d28fa737

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Build the zfb Rust binary once and share it across install-bearing jobs.
  # ---------------------------------------------------------------------------
  build-zfb:
    name: Build zfb Binary
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pinned zfb
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Takazudo/zudo-front-builder
          ref: ${{ env.ZFB_PINNED_SHA }}
          path: zfb-src
          fetch-depth: 1

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: zfb-src
          key: zfb-${{ env.ZFB_PINNED_SHA }}

      - name: Build zfb release binary
        run: cargo build -p zfb --release
        working-directory: zfb-src

      # See pr-checks.yml `build-zfb` for the rationale on uploading the
      # tailwindcss v4 standalone CLI as a separate artifact.
      - name: Fetch tailwindcss binary
        run: node scripts/fetch-tailwind.mjs
        working-directory: zfb-src

      - name: Upload zfb binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: zfb-binary
          path: zfb-src/target/release/zfb
          if-no-files-found: error
          retention-days: 1

      - name: Upload zfb tailwind binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: zfb-tailwind-binary
          path: zfb-src/crates/zfb/binaries/tailwindcss-v4
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 1: Build the zfb docs site (shallow clone — fast)
  # ---------------------------------------------------------------------------
  build-site:
    name: Build Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-zfb

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Clone zfb sibling repo
        run: |
          git clone https://github.com/Takazudo/zudo-front-builder.git ../zfb
          git -C ../zfb checkout "$ZFB_PINNED_SHA"

      - name: Download zfb binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: zfb-binary
          path: ../zfb/target/release

      - name: Mark zfb binary executable
        run: chmod +x ../zfb/target/release/zfb

      # See pr-checks.yml `typecheck` for the tailwind binary placement rationale.
      - name: Download zfb tailwind binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: zfb-tailwind-binary
          path: ../zfb/crates/zfb/binaries

      - name: Mark zfb tailwind binary executable
        run: chmod +x ../zfb/crates/zfb/binaries/tailwindcss-v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          SKIP_DOC_HISTORY: "1"

      - name: Cache site build output
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist/
          key: dist-${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Job 2: Build doc history JSONs (full clone — only this job needs it)
  # ---------------------------------------------------------------------------
  # See pr-checks.yml `build-history` for the decision to skip the zfb
  # binary download here: doc-history-server is standalone and the
  # postinstall hook is no-op-when-absent. We still clone the pinned zfb
  # source so pnpm can resolve the file:../zfb/... workspace deps.
  build-history:
    name: Build Doc History
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Clone zfb sibling repo
        run: |
          git clone https://github.com/Takazudo/zudo-front-builder.git ../zfb
          git -C ../zfb checkout "$ZFB_PINNED_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate doc history
        run: |
          pnpm --filter @zudo-doc/doc-history-server generate \
            --content-dir ../../src/content/docs \
            --locale ja:../../src/content/docs-ja \
            --out-dir ../../doc-history-out

      - name: Cache doc history output
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: doc-history-out/
          key: doc-history-${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Cloudflare Pages (production)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloudflare Pages
    needs: [build-site, build-history]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restore site build cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: dist/
          key: dist-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Restore doc history cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: doc-history-out/
          key: doc-history-${{ github.run_id }}

      - name: Prepare deploy directory
        # Layout produced (audited in epic #1337 task 5):
        #   deploy/_redirects                       — root-level redirect
        #   deploy/pj/zudo-doc/index.html           — (a) home + per-route HTML
        #   deploy/pj/zudo-doc/404.html             — (b) zfb #100 convention
        #   deploy/pj/zudo-doc/sitemap.xml          — (d) page route
        #   deploy/pj/zudo-doc/search-index.json    — (e) plugin
        #   deploy/pj/zudo-doc/llms*.txt            — (f) plugin (per-locale too)
        #   deploy/pj/zudo-doc/doc-history/*.json   — (g) merged below
        #   deploy/pj/zudo-doc/_worker.js           — (h) zfb adapter output
        #   deploy/pj/zudo-doc/_zfb_inner.mjs       — (h) zfb adapter sidecar
        # Note: zfb emits a flat dist/ (no dist/client/ split — that was the
        # Astro hybrid-mode shape). The dist/client/ branch below is a defensive
        # legacy fallback; under zfb only the else-branch runs.
        run: |
          mkdir -p deploy/pj/zudo-doc
          if [ -d dist/client ]; then
            # Legacy Astro hybrid-mode layout — never produced by zfb.
            cp -r dist/client/. deploy/pj/zudo-doc/
          else
            # zfb flat output: index.html, 404.html, _worker.js,
            # _zfb_inner.mjs, sitemap.xml, search-index.json, llms*.txt,
            # _astro/ assets, per-route docs/, plus public/ pass-through.
            cp -r dist/. deploy/pj/zudo-doc/
          fi
          # (g) Merge doc history JSONs into the deploy directory.
          if [ -d doc-history-out ] && [ "$(ls -A doc-history-out 2>/dev/null)" ]; then
            mkdir -p deploy/pj/zudo-doc/doc-history
            cp -r doc-history-out/. deploy/pj/zudo-doc/doc-history/
          fi
          # (c) Root-level _redirects: bare-domain hits land on the based site.
          echo '/ /pj/zudo-doc/ 302' > deploy/_redirects

      - name: Deploy to Cloudflare Pages (production)
        id: deploy
        run: |
          npx wrangler@4 pages deploy deploy \
            --project-name=zudo-doc \
            --branch=main \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Production deploy: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Guardrail: assert that the deployed HTML has /pj/zudo-doc/-prefixed
      # asset URLs (stylesheet href and islands script src).  If zfb silently
      # drops the `base` threading in a future version this step goes red
      # before the broken production site reaches users — fixing the gap
      # documented in epic #1386 / #1389 ("CI green is necessary but not
      # sufficient for feature delivered").
      - name: Verify production site has prefixed asset URLs
        run: |
          set -euo pipefail
          PROD_URL="https://zudo-doc.pages.dev/pj/zudo-doc/"
          echo "Checking prefixed asset URLs at: $PROD_URL"
          HTML=$(curl -fsSL "$PROD_URL")
          # Use here-strings (not echo|grep) so grep -q exiting early on a
          # match cannot SIGPIPE upstream echo + flip pipefail.
          grep -qE 'href="/pj/zudo-doc/assets/' <<<"$HTML" \
            || { echo "::error::Production HTML missing prefixed stylesheet href"; exit 1; }
          grep -qE 'src="/pj/zudo-doc/assets/' <<<"$HTML" \
            || { echo "::error::Production HTML missing prefixed islands script src"; exit 1; }
          echo "OK: production site has prefixed asset URLs"

  # ---------------------------------------------------------------------------
  # Job 4: Send IFTTT notification with deploy status
  # ---------------------------------------------------------------------------
  notify:
    name: Deploy Notification
    needs: [build-zfb, build-site, build-history, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Notify via IFTTT
        if: env.IFTTT_PROD_NOTIFY != ''
        env:
          IFTTT_PROD_NOTIFY: ${{ secrets.IFTTT_PROD_NOTIFY }}
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
          BUILD_ZFB_RESULT: ${{ needs.build-zfb.result }}
          BUILD_SITE_RESULT: ${{ needs.build-site.result }}
          BUILD_HISTORY_RESULT: ${{ needs.build-history.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          GITHUB_SHA_VAL: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="zudo-doc deploy succeeded!"
          elif [ "$BUILD_ZFB_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (zfb binary build)"
          elif [ "$BUILD_SITE_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (site build)"
          elif [ "$BUILD_HISTORY_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (history build)"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            STATUS="zudo-doc deploy failed (deploy)"
          else
            STATUS="zudo-doc deploy cancelled"
          fi

          COMMIT_MSG=$(echo "$RAW_COMMIT_MSG" | head -1 | sed 's/"/\\"/g')
          SHORT_SHA=$(echo "$GITHUB_SHA_VAL" | cut -c1-7)
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          curl -sSf --max-time 10 -X POST "$IFTTT_PROD_NOTIFY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"value1\": \"${STATUS}\",
              \"value2\": \"${SHORT_SHA} ${COMMIT_MSG}\",
              \"value3\": \"${RUN_URL}\"
            }" || echo "::warning::IFTTT notification failed"
