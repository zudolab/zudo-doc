# Pull request quality checks and preview deployment.
#
# Triggered on PRs targeting `main`. The pipeline:
#   1. Builds the Astro docs site
#   2. Deploys a preview to Cloudflare Pages
#   3. Posts the preview URL as a PR comment
#
# Concurrency: cancel in-progress runs for the same PR to save resources.

name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-runner:
    uses: ./.github/workflows/detect-runner.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Job 1: Build the Astro docs site
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: detect-runner
    runs-on: ${{ needs.detect-runner.outputs.runner }}
    timeout-minutes: 15

    steps:
      # fetch-depth: 0 is required for docHistoryIntegration (reads git log)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-out
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2: Deploy preview and comment on PR
  # ---------------------------------------------------------------------------
  preview:
    name: Preview Deploy
    needs: [detect-runner, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-out
          path: deploy/

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy preview to Cloudflare Pages
        id: cf-deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          wrangler pages deploy deploy \
            --project-name=zudo-doc \
            --branch="pr-${PR_NUMBER}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Preview: PR #${PR_NUMBER}"

          DEPLOY_URL="https://pr-${PR_NUMBER}.zudo-doc.pages.dev"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          DEPLOY_URL: ${{ steps.cf-deploy.outputs.deploy_url }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = context.issue.number;
            const marker = '<!-- cf-preview-pr -->';

            const body = [
              marker,
              `## Cloudflare Pages Preview`,
              '',
              `Preview deployment is ready.`,
              '',
              `| | URL |`,
              `|---|---|`,
              `| Preview | ${deployUrl} |`,
              '',
              `Built from commit: \`${context.sha.substring(0, 7)}\``,
            ].join('\n');

            // Look for an existing comment from this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing preview comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new preview comment');
            }
