<p>Authors often link with .md/.mdx extensions:</p>
<ul>
<li><a href="./sibling/">Sibling page</a></li>
<li><a href="../guide/intro/">Up and over</a></li>
<li><a href="./other/#install">With anchor</a></li>
<li><a href="./other.md?foo=bar">With query</a></li>
</ul>
<p>External links must be left alone:</p>
<ul>
<li><a href="https://example.com/foo.md">External</a></li>
<li><a href="mailto:hi@example.com">Mailto</a></li>
</ul>
<p>Pure anchor stays untouched:</p>
<ul>
<li><a href="#section">Anchor only</a></li>
</ul>
